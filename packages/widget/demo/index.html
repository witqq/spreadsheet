<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WitTable Widget Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; background: #f5f5f5; }
    h1 { margin-bottom: 8px; font-size: 20px; }
    p { margin-bottom: 16px; color: #666; font-size: 14px; }
    #grid { width: 100%; height: 500px; border: 1px solid #ddd; background: #fff; }
  </style>
</head>
<body>
  <h1>@wit-table/widget — Embeddable Demo</h1>
  <p>Single &lt;script&gt; tag, no build step, no framework.</p>
  <div id="grid"></div>

  <script src="../dist/wit-table-widget.umd.cjs"></script>
  <script>
    var columns = [
      { key: 'id', title: '#', width: 60, type: 'number' },
      { key: 'name', title: 'Name', width: 150 },
      { key: 'email', title: 'Email', width: 220 },
      { key: 'department', title: 'Department', width: 140 },
      { key: 'salary', title: 'Salary', width: 100, type: 'number' },
    ];

    var departments = ['Engineering', 'Sales', 'Marketing', 'Support', 'HR'];
    var data = [];
    for (var i = 0; i < 1000; i++) {
      data.push({
        id: i + 1,
        name: 'Employee ' + (i + 1),
        email: 'emp' + (i + 1) + '@company.com',
        department: departments[i % departments.length],
        salary: 50000 + Math.floor(Math.random() * 50000),
      });
    }

    var engine = WitTable.create('#grid', {
      columns: columns,
      data: data,
      editable: true,
      sortable: true,
      showRowNumbers: true,
    });

    console.log('WitTable widget loaded. Engine:', engine);
  </script>
</body>
</html>
